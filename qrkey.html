<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRKey Studio</title>

  <!-- React + ReactDOM UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Framer Motion UMD -->
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>

  <!-- QR Code Styling -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0c0c0c; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0c0c; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .qr-preview-wrapper canvas { border-radius: 12px; display: block; }

    .dot-btn { transition: all 0.15s ease; }
    .dot-btn:hover { transform: scale(1.05); }
    .dot-btn.active { box-shadow: 0 0 0 2px #d4a853; }

    .control-section { border-bottom: 1px solid #1e1e1e; }

    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      padding: 2px;
      background: transparent;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%; height: 3px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #d4a853;
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .tab-pill { transition: all 0.2s ease; cursor: pointer; border: none; background: transparent; }
    .tab-pill.active { background: #d4a853; color: #0c0c0c; }

    .input-field {
      background: #111;
      border: 1px solid #222;
      color: #e8e4dc;
      border-radius: 8px;
      padding: 10px 14px;
      width: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-field:focus { border-color: #d4a853; }
    .input-field::placeholder { color: #444; }

    .toggle-switch {
      position: relative;
      width: 40px; height: 22px;
      background: #222;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch.on { background: #d4a853; }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(18px); }

    .download-btn {
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: transparent;
    }
    .download-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(212,168,83,0.1);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .download-btn:hover::before { transform: scaleX(1); }
    .download-btn:hover { border-color: #d4a853 !important; color: #d4a853 !important; }
    .download-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @keyframes qrPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    .qr-loading { animation: qrPulse 1.2s ease infinite; }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .notification-anim { animation: fadeDown 0.3s ease; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.5s ease forwards; }

    .left-panel { animation: fadeIn 0.6s 0.1s ease both; }
    .right-panel { animation: fadeIn 0.6s 0.2s ease both; }

    .contrast-warn {
      display: flex; align-items: center; gap: 8px;
      background: #2a1a0a; border: 1px solid #5a3a1a;
      border-radius: 8px; padding: 8px 12px;
    }
    .contrast-ok { font-size: 10px; color: #2a7a4b; }

    .logo-drop-zone {
      border: 2px dashed #1e1e1e;
      border-radius: 12px; padding: 24px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s;
    }
    .logo-drop-zone:hover { border-color: #2a2a2a; }
    .logo-drop-zone.hover { border-color: #d4a853; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;
    const { motion, AnimatePresence } = window.Motion || window.FramerMotion || {};

    // ── Constants ──────────────────────────────────────────────
    const INPUT_TYPES  = ["URL", "Text", "WiFi", "vCard"];
    const DOT_STYLES   = ["square","dots","rounded","classy","classy-rounded","extra-rounded"];
    const EYE_STYLES   = ["square","extra-rounded","dot"];
    const EC_LEVELS    = ["L","M","Q","H"];

    // ── Encoders ───────────────────────────────────────────────
    function encodeWifi({ ssid, password, security, hidden }) {
      return `WIFI:T:${security};S:${ssid};P:${password};H:${hidden ? "true" : "false"};;`;
    }
    function encodeVCard({ name, phone, email, org, url }) {
      return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nURL:${url}\nEND:VCARD`;
    }

    // ── Contrast helpers ───────────────────────────────────────
    function hexToRgb(hex) {
      const c = hex.replace("#","");
      return [parseInt(c.slice(0,2),16), parseInt(c.slice(2,4),16), parseInt(c.slice(4,6),16)];
    }
    function luminance(r,g,b) {
      return [r,g,b].reduce((acc,v,i) => {
        const s = v/255;
        return acc + (s<=0.03928 ? s/12.92 : Math.pow((s+0.055)/1.055,2.4)) * [0.2126,0.7152,0.0722][i];
      }, 0);
    }
    function contrastRatio(h1,h2) {
      const l1 = luminance(...hexToRgb(h1));
      const l2 = luminance(...hexToRgb(h2));
      return (Math.max(l1,l2)+0.05) / (Math.min(l1,l2)+0.05);
    }

    // ── Fallback motion wrappers (if Framer Motion fails to load) ──
    const Div = motion ? motion.div : (props) => { const {children,...rest} = props; delete rest.initial; delete rest.animate; delete rest.exit; delete rest.transition; return <div {...rest}>{children}</div>; };
    const Header = motion ? motion.header : (props) => { const {children,...rest} = props; delete rest.initial; delete rest.animate; delete rest.exit; delete rest.transition; return <header {...rest}>{children}</header>; };

    // ── Main App ───────────────────────────────────────────────
    function QRKey() {
      const canvasRef   = useRef(null);
      const qrRef       = useRef(null);
      const logoInputRef = useRef(null);

      const [activeTab, setActiveTab] = useState("URL");
      const [qrReady,   setQrReady]   = useState(false);
      const [libLoaded, setLibLoaded] = useState(!!window.QRCodeStyling);

      // Inputs
      const [urlValue,  setUrlValue]  = useState("https://anthropic.com");
      const [textValue, setTextValue] = useState("Hello, World!");
      const [wifiData,  setWifiData]  = useState({ ssid:"", password:"", security:"WPA", hidden:false });
      const [vcardData, setVcardData] = useState({ name:"", phone:"", email:"", org:"", url:"" });

      // Style
      const [fgColor,       setFgColor]       = useState("#0a0a0a");
      const [bgColor,       setBgColor]       = useState("#ffffff");
      const [transparentBg, setTransparentBg] = useState(false);
      const [dotStyle,      setDotStyle]      = useState("rounded");
      const [eyeStyle,      setEyeStyle]      = useState("extra-rounded");
      const [ecLevel,       setEcLevel]       = useState("M");
      const [logoUrl,       setLogoUrl]       = useState(null);
      const [logoSize,      setLogoSize]      = useState(0.25);
      const [margin,        setMargin]        = useState(2);
      const [qrSize]                          = useState(320);

      // UI
      const [contrastOk,  setContrastOk]  = useState(true);
      const [contrastVal, setContrastVal] = useState("21.0");
      const [downloading, setDownloading] = useState(null);
      const [logoHover,   setLogoHover]   = useState(false);
      const [notification,setNotification]= useState(null);

      // Wait for QRCodeStyling to be available
      useEffect(() => {
        if (window.QRCodeStyling) { setLibLoaded(true); return; }
        const id = setInterval(() => { if (window.QRCodeStyling) { setLibLoaded(true); clearInterval(id); } }, 200);
        return () => clearInterval(id);
      }, []);

      const getQRData = useCallback(() => {
        switch(activeTab) {
          case "URL":   return urlValue  || "https://example.com";
          case "Text":  return textValue || "Hello";
          case "WiFi":  return encodeWifi(wifiData);
          case "vCard": return encodeVCard(vcardData);
          default:      return urlValue;
        }
      }, [activeTab, urlValue, textValue, wifiData, vcardData]);

      // Contrast check
      useEffect(() => {
        if (transparentBg) { setContrastOk(true); return; }
        const r = contrastRatio(fgColor, bgColor);
        setContrastVal(r.toFixed(1));
        setContrastOk(r >= 3);
      }, [fgColor, bgColor, transparentBg]);

      // Auto-upgrade EC when logo added
      useEffect(() => {
        if (logoUrl && (ecLevel === "L" || ecLevel === "M")) {
          setEcLevel("H");
          showNotification("Error correction upgraded to H for logo");
        }
      }, [logoUrl]);

      const buildOptions = useCallback(() => {
        const eyeMap = {
          "square":        { outer:"square",        inner:"square" },
          "extra-rounded": { outer:"extra-rounded", inner:"extra-rounded" },
          "dot":           { outer:"extra-rounded", inner:"dot" },
        };
        const eye = eyeMap[eyeStyle] || eyeMap["extra-rounded"];
        return {
          width: qrSize, height: qrSize, type: "canvas",
          data: getQRData(), margin,
          qrOptions: { errorCorrectionLevel: ecLevel },
          backgroundOptions: { color: transparentBg ? "transparent" : bgColor },
          dotsOptions:         { color: fgColor, type: dotStyle },
          cornersSquareOptions:{ color: fgColor, type: eye.outer },
          cornersDotOptions:   { color: fgColor, type: eye.inner },
          ...(logoUrl ? { image: logoUrl, imageOptions:{ crossOrigin:"anonymous", margin:4, imageSize:logoSize, hideBackgroundDots:true } } : {}),
        };
      }, [getQRData, fgColor, bgColor, transparentBg, dotStyle, eyeStyle, ecLevel, logoUrl, logoSize, qrSize, margin]);

      // Init / update QR
      useEffect(() => {
        if (!libLoaded || !canvasRef.current) return;
        const opts = buildOptions();
        if (!qrRef.current) {
          qrRef.current = new window.QRCodeStyling(opts);
          qrRef.current.append(canvasRef.current);
          setQrReady(true);
        } else {
          qrRef.current.update(opts);
        }
      }, [libLoaded, buildOptions]);

      function showNotification(msg) {
        setNotification(msg);
        setTimeout(() => setNotification(null), 3000);
      }

      async function handleDownload(fmt) {
        if (!qrRef.current) return;
        setDownloading(fmt);
        try {
          await qrRef.current.download({ name:"qrkey", extension: fmt });
          showNotification(`Downloaded as ${fmt.toUpperCase()}`);
        } catch(e) { showNotification("Download failed"); }
        setTimeout(() => setDownloading(null), 1000);
      }

      function handleLogoUpload(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => setLogoUrl(ev.target.result);
        reader.readAsDataURL(file);
      }

      function removeLogo() {
        setLogoUrl(null);
        if (logoInputRef.current) logoInputRef.current.value = "";
        if (ecLevel === "H") setEcLevel("M");
      }

      const inputData = getQRData();

      return (
        <div style={{ fontFamily:"'DM Mono','Courier New',monospace", minHeight:"100vh", background:"#0c0c0c", color:"#e8e4dc", overflowX:"hidden" }}>

          {/* Notification */}
          {notification && (
            <div className="notification-anim" style={{ position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", zIndex:999, background:"#d4a853", color:"#0c0c0c", padding:"8px 20px", borderRadius:999, fontSize:12, fontWeight:500, boxShadow:"0 8px 32px rgba(0,0,0,0.5)", whiteSpace:"nowrap" }}>
              {notification}
            </div>
          )}

          {/* Header */}
          <header className="fade-in" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"20px 32px", borderBottom:"1px solid #1a1a1a" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>

 />
              <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
                <span style={{ fontFamily:"'Playfair Display',serif", fontWeight:700, fontSize:18, letterSpacing:"-0.02em" }}>QRKey</span>
                <span style={{ fontSize:10, color:"#444", letterSpacing:"0.2em", textTransform:"uppercase" }}>Studio</span>

            <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:11, color:"#333" }}>
              <span style={{ width:8, height:8, borderRadius:"50%", background:"#2a7a4b", display:"inline-block" }}></span>

            </div>
          </header>

          {/* Body */}
          <div style={{ display:"flex", flexWrap:"wrap", minHeight:"calc(100vh - 65px)" }}>

            {/* ── LEFT PANEL ── */}
            <div className="left-panel" style={{ width:400, minWidth:340, borderRight:"1px solid #1a1a1a", overflowY:"auto", maxHeight:"calc(100vh - 65px)", flexShrink:0 }}>

              {/* Input type tabs */}
              <div className="control-section" style={{ padding:24 }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:12 }}>Input Type</div>
                <div style={{ display:"flex", gap:4, padding:4, background:"#111", borderRadius:10 }}>
                  {INPUT_TYPES.map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)}
                      className={`tab-pill ${activeTab===tab?"active":""}`}
                      style={{ flex:1, padding:"8px 4px", borderRadius:7, fontSize:12, fontWeight:500, color: activeTab===tab?"#0c0c0c":"#555", fontFamily:"inherit" }}>
                      {tab}
                    </button>
                  ))}
                </div>
              </div>

              {/* Input fields */}
              <div className="control-section" style={{ padding:24 }}>
                {activeTab === "URL" && (
                  <div>
                    <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:8 }}>URL</div>
                    <input className="input-field" placeholder="https://example.com" value={urlValue} onChange={e=>setUrlValue(e.target.value)} />
                  </div>
                )}
                {activeTab === "Text" && (
                  <div>
                    <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:8 }}>Plain Text</div>
                    <textarea className="input-field" rows={3} placeholder="Enter any text…" value={textValue} onChange={e=>setTextValue(e.target.value)} style={{ resize:"none", lineHeight:1.6 }} />
                  </div>
                )}
                {activeTab === "WiFi" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    <div>
                      <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:6 }}>Network Name (SSID)</div>
                      <input className="input-field" placeholder="MyNetwork" value={wifiData.ssid} onChange={e=>setWifiData(p=>({...p,ssid:e.target.value}))} />
                    </div>
                    <div>
                      <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:6 }}>Password</div>
                      <input className="input-field" type="password" placeholder="••••••••" value={wifiData.password} onChange={e=>setWifiData(p=>({...p,password:e.target.value}))} />
                    </div>
                    <div style={{ display:"flex", gap:8 }}>
                      {["WPA","WEP","nopass"].map(s => (
                        <button key={s} onClick={()=>setWifiData(p=>({...p,security:s}))}
                          style={{ flex:1, padding:"8px 0", borderRadius:8, fontSize:12, cursor:"pointer", fontFamily:"inherit", background:"transparent", border:`1px solid ${wifiData.security===s?"#d4a853":"#222"}`, color:wifiData.security===s?"#d4a853":"#555", transition:"all 0.15s" }}>
                          {s}
                        </button>
                      ))}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <span style={{ fontSize:12, color:"#555" }}>Hidden Network</span>
                      <div className={`toggle-switch ${wifiData.hidden?"on":""}`} onClick={()=>setWifiData(p=>({...p,hidden:!p.hidden}))} />
                    </div>
                  </div>
                )}
                {activeTab === "vCard" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    {[{key:"name",label:"Full Name",ph:"Jane Smith"},{key:"phone",label:"Phone",ph:"+1 555 000 0000"},{key:"email",label:"Email",ph:"jane@example.com"},{key:"org",label:"Organization",ph:"Acme Corp"},{key:"url",label:"Website",ph:"https://example.com"}].map(({key,label,ph})=>(
                      <div key={key}>
                        <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:6 }}>{label}</div>
                        <input className="input-field" placeholder={ph} value={vcardData[key]} onChange={e=>setVcardData(p=>({...p,[key]:e.target.value}))} />
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Colors */}
              <div className="control-section" style={{ padding:24 }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:16 }}>Colors</div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {/* Foreground */}
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span style={{ fontSize:12, color:"#888" }}>Foreground</span>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:11, color:"#444", fontFamily:"monospace" }}>{fgColor}</span>
                      <div style={{ width:36, height:36, borderRadius:8, border:"1px solid #2a2a2a", overflow:"hidden" }}>
                        <input type="color" value={fgColor} onChange={e=>setFgColor(e.target.value)} />
                      </div>
                    </div>
                  </div>
                  {/* Background */}
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span style={{ fontSize:12, color:"#888" }}>Background</span>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:11, color:"#444", fontFamily:"monospace" }}>{transparentBg?"transparent":bgColor}</span>
                      {!transparentBg && (
                        <div style={{ width:36, height:36, borderRadius:8, border:"1px solid #2a2a2a", overflow:"hidden" }}>
                          <input type="color" value={bgColor} onChange={e=>setBgColor(e.target.value)} />
                        </div>
                      )}
                    </div>
                  </div>
                  {/* Transparent toggle */}
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span style={{ fontSize:12, color:"#888" }}>Transparent Background</span>
                    <div className={`toggle-switch ${transparentBg?"on":""}`} onClick={()=>setTransparentBg(p=>!p)} />
                  </div>
                  {/* Contrast feedback */}
                  {!transparentBg && !contrastOk && (
                    <div className="contrast-warn">
                      <span style={{ color:"#f5a623" }}>⚠</span>
                      <span style={{ fontSize:11, color:"#f5a623" }}>Low contrast ({contrastVal}:1) — may not scan reliably</span>
                    </div>
                  )}
                  {!transparentBg && contrastOk && (
                    <span className="contrast-ok">✓ Contrast {contrastVal}:1 — scannable</span>
                  )}
                </div>
              </div>

              {/* Dot Style */}
              <div className="control-section" style={{ padding:24 }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:14 }}>Dot Pattern</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
                  {DOT_STYLES.map(style => (
                    <button key={style} onClick={()=>setDotStyle(style)}
                      className={`dot-btn ${dotStyle===style?"active":""}`}
                      style={{ padding:"8px 4px", borderRadius:8, fontSize:11, cursor:"pointer", fontFamily:"inherit", background: dotStyle===style?"rgba(212,168,83,0.06)":"transparent", border:`1px solid ${dotStyle===style?"#d4a853":"#1e1e1e"}`, color: dotStyle===style?"#d4a853":"#555" }}>
                      {style.replace("-"," ")}
                    </button>
                  ))}
                </div>
              </div>

              {/* Eye Style */}
              <div className="control-section" style={{ padding:24 }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:14 }}>Corner Eyes</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
                  {EYE_STYLES.map(style => (
                    <button key={style} onClick={()=>setEyeStyle(style)}
                      className={`dot-btn ${eyeStyle===style?"active":""}`}
                      style={{ padding:"8px 4px", borderRadius:8, fontSize:11, cursor:"pointer", fontFamily:"inherit", background: eyeStyle===style?"rgba(212,168,83,0.06)":"transparent", border:`1px solid ${eyeStyle===style?"#d4a853":"#1e1e1e"}`, color: eyeStyle===style?"#d4a853":"#555" }}>
                      {style==="extra-rounded"?"rounded":style}
                    </button>
                  ))}
                </div>
              </div>

              {/* Error Correction */}
              <div className="control-section" style={{ padding:24 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555" }}>Error Correction</div>
                  <div style={{ fontSize:10, color:"#333" }}>{ecLevel==="L"?"7%":ecLevel==="M"?"15%":ecLevel==="Q"?"25%":"30%"} recovery</div>
                </div>
                <div style={{ display:"flex", gap:4 }}>
                  {EC_LEVELS.map(level => (
                    <button key={level} onClick={()=>setEcLevel(level)}
                      style={{ flex:1, padding:"8px 0", borderRadius:8, fontSize:12, fontFamily:"'DM Mono',monospace", cursor:"pointer", background: ecLevel===level?"rgba(212,168,83,0.06)":"transparent", border:`1px solid ${ecLevel===level?"#d4a853":"#1e1e1e"}`, color: ecLevel===level?"#d4a853":"#555" }}>
                      {level}
                    </button>
                  ))}
                </div>
              </div>

              {/* Logo */}
              <div className="control-section" style={{ padding:24 }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555", marginBottom:14 }}>Logo / Watermark</div>
                {!logoUrl ? (
                  <div className={`logo-drop-zone ${logoHover?"hover":""}`}
                    onClick={()=>logoInputRef.current?.click()}
                    onDragOver={e=>{e.preventDefault();setLogoHover(true);}}
                    onDragLeave={()=>setLogoHover(false)}
                    onDrop={e=>{e.preventDefault();setLogoHover(false);const f=e.dataTransfer.files?.[0];if(f){const r=new FileReader();r.onload=ev=>setLogoUrl(ev.target.result);r.readAsDataURL(f);}}}>
                    <div style={{ fontSize:24, opacity:0.3, marginBottom:8 }}>⊕</div>
                    <div style={{ fontSize:12, color:"#444" }}>Drop image or click to upload</div>
                    <div style={{ fontSize:10, color:"#333", marginTop:4 }}>PNG, SVG, JPG</div>
                  </div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, background:"#111", borderRadius:12, padding:12 }}>
                      <img src={logoUrl} alt="logo" style={{ width:40, height:40, borderRadius:8, objectFit:"contain", background:"white", padding:4 }} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:12, color:"#888" }}>Logo uploaded</div>
                        <div style={{ fontSize:10, color:"#444" }}>EC upgraded to H</div>
                      </div>
                      <button onClick={removeLogo} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#444", fontSize:20, lineHeight:1, transition:"color 0.15s" }}
                        onMouseEnter={e=>e.target.style.color="#d4a853"} onMouseLeave={e=>e.target.style.color="#444"}>×</button>
                    </div>
                    <div>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                        <span style={{ fontSize:12, color:"#555" }}>Size</span>
                        <span style={{ fontSize:11, fontFamily:"monospace", color:"#444" }}>{Math.round(logoSize*100)}%</span>
                      </div>
                      <input type="range" min="10" max="40" value={logoSize*100} onChange={e=>setLogoSize(parseInt(e.target.value)/100)} />
                    </div>
                  </div>
                )}
                <input ref={logoInputRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleLogoUpload} />
              </div>

              {/* Margin */}
              <div style={{ padding:24 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.2em", color:"#555" }}>Quiet Zone Margin</div>
                  <span style={{ fontSize:11, fontFamily:"monospace", color:"#444" }}>{margin}px</span>
                </div>
                <input type="range" min="0" max="10" value={margin} onChange={e=>setMargin(parseInt(e.target.value))} />
              </div>
            </div>

            {/* ── RIGHT PANEL ── */}
            <div className="right-panel" style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:48, gap:32, minWidth:340 }}>

              {/* QR Preview */}
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:24 }}>
                <div style={{ position:"relative" }}>
                  {/* Ambient glow */}
                  <div style={{ position:"absolute", inset:0, borderRadius:20, filter:"blur(40px)", opacity:0.15, transform:"scale(1.1)", background:fgColor, pointerEvents:"none" }} />
                  {/* Canvas wrapper */}
                  <div style={{
                    position:"relative", borderRadius:20, overflow:"hidden",
                    boxShadow:"0 24px 80px rgba(0,0,0,0.6)",
                    background: transparentBg ? "repeating-conic-gradient(#1a1a1a 0% 25%, #111 0% 50%) 0 0 / 16px 16px" : bgColor,
                    padding:12, border:"1px solid #1e1e1e"
                  }}>
                    {!libLoaded && (
                      <div className="qr-loading" style={{ width:qrSize, height:qrSize, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <span style={{ fontSize:11, color:"#333", letterSpacing:"0.2em" }}>LOADING ENGINE</span>
                      </div>
                    )}
                    <div ref={canvasRef} style={{ display: libLoaded ? "block" : "none" }} />
                  </div>
                </div>

                {/* Data preview pill */}
                <div style={{ display:"flex", alignItems:"center", gap:8, background:"#111", border:"1px solid #1a1a1a", borderRadius:999, padding:"8px 16px", maxWidth:360, width:"100%" }}>
                  <span style={{ fontSize:12, color:"#444", flexShrink:0 }}>
                    {activeTab==="URL"?"🔗":activeTab==="WiFi"?"📶":activeTab==="vCard"?"👤":"📝"}
                  </span>
                  <span style={{ fontSize:11, color:"#555", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontFamily:"monospace" }}>
                    {inputData.substring(0,60)}{inputData.length>60?"…":""}
                  </span>
                  <span style={{ fontSize:10, color:"#333", flexShrink:0, marginLeft:"auto" }}>{inputData.length}c</span>
                </div>
              </div>

              {/* Download buttons */}
              <div style={{ display:"flex", gap:12, width:"100%", maxWidth:360 }}>
                {["png","svg"].map(fmt => (
                  <button key={fmt} onClick={()=>handleDownload(fmt)} disabled={!qrReady || !!downloading}
                    className="download-btn"
                    style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"12px 24px", borderRadius:12, border:"1px solid #2a2a2a", fontSize:13, color:"#888", fontFamily:"inherit" }}>
                    {downloading===fmt ? (
                      <span style={{ fontSize:10, letterSpacing:"0.2em" }}>SAVING…</span>
                    ) : (
                      <>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5">
                          <path d="M7 1v8M4 6l3 3 3-3M1 10v1a2 2 0 002 2h8a2 2 0 002-2v-1"/>
                        </svg>
                        Download {fmt.toUpperCase()}
                      </>
                    )}
                  </button>
                ))}
              </div>

              {/* Info tiles */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, width:"100%", maxWidth:360 }}>
                {[{icon:"⬡",label:"Client-side",sub:"100% private"},{icon:"◈",label:"Vector SVG",sub:"Infinite scale"},{icon:"◉",label:"EC Level H",sub:"30% recovery"}].map(({icon,label,sub})=>(
                  <div key={label} style={{ background:"#0e0e0e", border:"1px solid #151515", borderRadius:12, padding:12, textAlign:"center" }}>
                    <div style={{ fontSize:18, opacity:0.3, marginBottom:4 }}>{icon}</div>
                    <div style={{ fontSize:10, color:"#666" }}>{label}</div>
                    <div style={{ fontSize:9, color:"#333", marginTop:2 }}>{sub}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<QRKey />);
  </script>
</body>
</html>
