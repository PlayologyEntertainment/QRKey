<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRKey // TERMINAL</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }

    :root {
      --bg:        #0a0a0a;
      --primary:   #33ff00;
      --secondary: #ffb000;
      --muted:     #1f521f;
      --error:     #ff3333;
      --border:    #1f521f;
      --font:      'JetBrains Mono', 'Fira Code', monospace;
      --glow:      0 0 6px rgba(51,255,0,0.55);
      --glow-md:   0 0 12px rgba(51,255,0,0.35);
    }

    body {
      background: var(--bg);
      color: var(--primary);
      font-family: var(--font);
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── CRT scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.10) 3px,
        rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); }

    /* ── Typography ── */
    .term-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-shadow: none;
    }
    .term-glow { text-shadow: var(--glow); }
    .term-heading {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: var(--glow-md);
    }

    /* ── Blink animation ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1.1s step-end infinite; }

    @keyframes scanIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .scan-in { animation: scanIn 0.4s ease forwards; }

    /* ── Pane (terminal window) ── */
    .pane {
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .pane-header {
      border-bottom: 1px solid var(--border);
      padding: 6px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--primary);
      text-shadow: var(--glow);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(51,255,0,0.04);
    }

    /* ── Input fields ── */
    .term-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--muted);
      color: var(--primary);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 0 6px 4px;
      width: 100%;
      outline: none;
      text-shadow: var(--glow);
      caret-color: var(--primary);
    }
    .term-input:focus { border-bottom-color: var(--primary); }
    .term-input::placeholder { color: var(--muted); text-shadow: none; }
    .term-input[type="password"] { letter-spacing: 0.2em; }

    textarea.term-input { resize: none; border: 1px solid var(--muted); padding: 8px; line-height: 1.6; }
    textarea.term-input:focus { border-color: var(--primary); }

    /* ── Buttons ── */
    .term-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
      overflow: hidden;
    }
    .term-btn:hover {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      text-shadow: none;
      box-shadow: var(--glow-md);
    }
    .term-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      text-shadow: none;
      box-shadow: var(--glow);
    }
    .term-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .term-btn:disabled:hover { background: transparent; color: var(--muted); border-color: var(--muted); box-shadow: none; }

    /* ── Tab row ── */
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 4px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { color: var(--primary); background: rgba(51,255,0,0.04); }
    .tab-btn.active {
      color: #000;
      background: var(--primary);
      text-shadow: none;
    }

    /* ── Toggle ── */
    .term-toggle {
      position: relative;
      width: 44px; height: 20px;
      border: 1px solid var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .term-toggle.on { border-color: var(--primary); box-shadow: var(--glow); }
    .term-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: var(--muted);
      transition: all 0.15s;
    }
    .term-toggle.on::after { transform: translateX(24px); background: var(--primary); }

    /* ── Range slider ── */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%; height: 2px;
      background: var(--muted);
      outline: none;
      border-radius: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--primary);
      border-radius: 0;
      cursor: pointer;
      box-shadow: var(--glow);
    }

    /* ── Color input ── */
    input[type="color"] {
      -webkit-appearance: none;
      border: 1px solid var(--muted);
      width: 32px; height: 24px;
      padding: 1px;
      background: transparent;
      cursor: pointer;
      border-radius: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; }

    /* ── Download buttons ── */
    .dl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .dl-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s;
    }
    .dl-btn:hover::before { transform: scaleX(1); }
    .dl-btn:hover { color: #000; border-color: var(--primary); box-shadow: var(--glow-md); }
    .dl-btn span { position: relative; z-index: 1; }
    .dl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .dl-btn:disabled:hover::before { transform: scaleX(0); }
    .dl-btn:disabled:hover { color: var(--muted); border-color: var(--muted); box-shadow: none; }

    /* ── Progress bar ── */
    .term-bar {
      font-size: 11px;
      color: var(--primary);
      text-shadow: var(--glow);
      font-family: var(--font);
      letter-spacing: 0;
    }

    /* ── Prompt prefix ── */
    .prompt { color: var(--secondary); text-shadow: 0 0 6px rgba(255,176,0,0.5); }

    /* ── Notification ── */
    @keyframes ntfIn { from{opacity:0;top:4px} to{opacity:1;top:16px} }
    .ntf { animation: ntfIn 0.25s ease forwards; }

    /* ── QR canvas ── */
    .qr-wrap canvas { display: block; image-rendering: pixelated; }

    /* ── Logo drop zone ── */
    .drop-zone {
      border: 1px dashed var(--muted);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover, .drop-zone.hover { border-color: var(--primary); background: rgba(51,255,0,0.03); }

    /* ── Control section divider ── */
    .ctrl-section { border-bottom: 1px solid var(--border); padding: 16px; }

    /* ── Glitch on hover ── */
    @keyframes glitch {
      0%   { clip-path: inset(20% 0 60% 0); transform: translateX(-2px); }
      20%  { clip-path: inset(60% 0 10% 0); transform: translateX(2px); }
      40%  { clip-path: inset(40% 0 40% 0); transform: translateX(-1px); }
      60%  { clip-path: inset(80% 0 5%  0); transform: translateX(1px); }
      80%  { clip-path: inset(10% 0 70% 0); transform: translateX(-2px); }
      100% { clip-path: inset(0% 0 0%  0); transform: translateX(0); }
    }

    /* ── Typewriter ── */
    @keyframes typing {
      from { width: 0; }
      to   { width: 100%; }
    }
  </style>
</head>

    // ── Encoders ─────────────────────────────────────────────
    function encodeWifi({ssid,password,security,hidden}) {
      return `WIFI:T:${security};S:${ssid};P:${password};H:${hidden?"true":"false"};;`;
    }
    function encodeVCard({name,phone,email,org,url}) {
      return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nURL:${url}\nEND:VCARD`;
    }

    // ── Contrast ─────────────────────────────────────────────
    function hexToRgb(hex) {
      const c = hex.replace("#","");
      return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];
    }
    function lum(r,g,b) {
      return [r,g,b].reduce((a,v,i)=>{
        const s=v/255; return a+(s<=0.03928?s/12.92:Math.pow((s+0.055)/1.055,2.4))*[0.2126,0.7152,0.0722][i];
      },0);
    }
    function contrast(h1,h2) {
      const l1=lum(...hexToRgb(h1)),l2=lum(...hexToRgb(h2));
      return ((Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05)).toFixed(1);
    }

    // ── Progress bar ─────────────────────────────────────────
    function TermBar({value, max=10, width=20}) {
      const filled = Math.round((value/max)*width);
      const empty  = width - filled;
      return (
        <span className="term-bar">
          [{"█".repeat(filled)}{"░".repeat(empty)}]
        </span>
      );
    }

    // ── Main App ─────────────────────────────────────────────
    function QRKey() {
      const canvasRef    = useRef(null);
      const qrRef        = useRef(null);
      const logoInputRef = useRef(null);

      const [activeTab,    setActiveTab]    = useState("URL");
      const [qrReady,      setQrReady]      = useState(false);
      const [libLoaded,    setLibLoaded]    = useState(!!window.QRCodeStyling);
      const [tick,         setTick]         = useState(true); // cursor blink

      // Inputs
      const [urlValue,  setUrlValue]  = useState("https://anthropic.com");
      const [textValue, setTextValue] = useState("Hello, World!");
      const [wifiData,  setWifiData]  = useState({ssid:"",password:"",security:"WPA",hidden:false});
      const [vcardData, setVcardData] = useState({name:"",phone:"",email:"",org:"",url:""});

      // Style
      const [fgColor,       setFgColor]       = useState("#33ff00");
      const [bgColor,       setBgColor]       = useState("#0a0a0a");
      const [transparentBg, setTransparentBg] = useState(false);
      const [dotStyle,      setDotStyle]      = useState("square");
      const [eyeStyle,      setEyeStyle]      = useState("square");
      const [ecLevel,       setEcLevel]       = useState("M");
      const [logoUrl,       setLogoUrl]       = useState(null);
      const [logoSize,      setLogoSize]      = useState(0.25);
      const [margin,        setMargin]        = useState(2);
      const [qrSize]                          = useState(300);

      // UI
      const [contrastOk,   setContrastOk]   = useState(true);
      const [contrastVal,  setContrastVal]  = useState("21.0");
      const [downloading,  setDownloading]  = useState(null);
      const [logoHover,    setLogoHover]    = useState(false);
      const [notification, setNotification] = useState(null);
      const [cmdLine,      setCmdLine]      = useState("");

      // Cursor blink
      useEffect(()=>{
        const id = setInterval(()=>setTick(t=>!t),530);
        return ()=>clearInterval(id);
      },[]);

      // Boot QR lib
      useEffect(()=>{
        if (window.QRCodeStyling){setLibLoaded(true);return;}
        const id=setInterval(()=>{if(window.QRCodeStyling){setLibLoaded(true);clearInterval(id);}},200);
        return ()=>clearInterval(id);
      },[]);

      const getQRData = useCallback(()=>{
        switch(activeTab){
          case "URL":   return urlValue  || "https://example.com";
          case "Text":  return textValue || "Hello";
          case "WiFi":  return encodeWifi(wifiData);
          case "vCard": return encodeVCard(vcardData);
          default:      return urlValue;
        }
      },[activeTab,urlValue,textValue,wifiData,vcardData]);

      useEffect(()=>{
        if(transparentBg){setContrastOk(true);return;}
        const r=contrast(fgColor,bgColor);
        setContrastVal(r);
        setContrastOk(parseFloat(r)>=3);
      },[fgColor,bgColor,transparentBg]);

      useEffect(()=>{
        if(logoUrl&&(ecLevel==="L"||ecLevel==="M")){
          setEcLevel("H");
          showNotification("[OK] EC auto-upgraded to H for logo integrity");
        }
      },[logoUrl]);

      const buildOptions = useCallback(()=>{
        const eyeMap={
          "square":        {outer:"square",        inner:"square"},
          "extra-rounded": {outer:"extra-rounded", inner:"extra-rounded"},
          "dot":           {outer:"extra-rounded", inner:"dot"},
        };
        const eye = eyeMap[eyeStyle]||eyeMap["square"];
        return {
          width:qrSize, height:qrSize, type:"canvas",
          data:getQRData(), margin,
          qrOptions:{errorCorrectionLevel:ecLevel},
          backgroundOptions:{color:transparentBg?"transparent":bgColor},
          dotsOptions:{color:fgColor, type:dotStyle},
          cornersSquareOptions:{color:fgColor, type:eye.outer},
          cornersDotOptions:{color:fgColor, type:eye.inner},
          ...(logoUrl?{image:logoUrl, imageOptions:{crossOrigin:"anonymous",margin:4,imageSize:logoSize,hideBackgroundDots:true}}:{}),
        };
      },[getQRData,fgColor,bgColor,transparentBg,dotStyle,eyeStyle,ecLevel,logoUrl,logoSize,qrSize,margin]);

      useEffect(()=>{
        if(!libLoaded||!canvasRef.current)return;
        const opts=buildOptions();
        if(!qrRef.current){
          qrRef.current=new window.QRCodeStyling(opts);
          qrRef.current.append(canvasRef.current);
          setQrReady(true);
        } else { qrRef.current.update(opts); }
      },[libLoaded,buildOptions]);

      function showNotification(msg){
        setNotification(msg);
        setTimeout(()=>setNotification(null),3500);
      }

      async function handleDownload(fmt){
        if(!qrRef.current)return;
        setDownloading(fmt);
        try{
          await qrRef.current.download({name:"qrkey",extension:fmt});
          showNotification(`[OK] qrkey.${fmt} written to disk`);
        }catch(e){ showNotification("[ERR] download failed"); }
        setTimeout(()=>setDownloading(null),1000);
      }

      function handleLogoUpload(e){
        const file=e.target.files?.[0];
        if(!file)return;
        const r=new FileReader();
        r.onload=ev=>setLogoUrl(ev.target.result);
        r.readAsDataURL(file);
      }

      function removeLogo(){
        setLogoUrl(null);
        if(logoInputRef.current)logoInputRef.current.value="";
        if(ecLevel==="H")setEcLevel("M");
        showNotification("[OK] logo detached");
      }

      const inputData = getQRData();
      const dataLen   = inputData.length;

      // ── Render ────────────────────────────────────────────
      return (
        <div style={{fontFamily:"var(--font)",minHeight:"100vh",background:"var(--bg)",color:"var(--primary)",display:"flex",flexDirection:"column"}}>

          {/* Notification */}
          {notification && (
            <div className="ntf" style={{position:"fixed",left:"50%",transform:"translateX(-50%)",zIndex:1000,background:"var(--bg)",border:"1px solid var(--primary)",color:"var(--primary)",padding:"7px 20px",fontSize:12,textShadow:"var(--glow)",letterSpacing:"0.08em",whiteSpace:"nowrap",boxShadow:"var(--glow-md)"}}>
              {notification}
            </div>
          )}

          {/* Header */}
          <div style={{borderBottom:"1px solid var(--border)",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(51,255,0,0.03)"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <img src={`data:image/png;base64,${LOGO_B64}`} alt="Playology" style={{width:38,height:38,objectFit:"contain",opacity:0.92}} />
              <div>
                <div style={{fontSize:16,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.15em",textShadow:"var(--glow-md)"}}>
                  QRKey<span className="blink" style={{color:"var(--primary)",marginLeft:2}}>_</span>
                </div>
                <div style={{fontSize:10,color:"var(--muted)",letterSpacing:"0.2em"}}>// TERMINAL v1.0.0</div>
              </div>
            </div>
            <div style={{fontSize:11,color:"var(--muted)",letterSpacing:"0.12em",textAlign:"right"}}>
              <div><span style={{color:"var(--primary)",textShadow:"var(--glow)"}}>●</span> PROC:LOCAL &nbsp; MEM:PRIVATE</div>
              <div>SYS:{new Date().toISOString().slice(0,10)}</div>
            </div>
          </div>

          {/* Body */}
          <div style={{display:"flex",flex:1,flexWrap:"wrap",overflow:"hidden"}}>

            {/* ── LEFT: Controls ── */}
            <div style={{width:380,minWidth:320,borderRight:"1px solid var(--border)",overflowY:"auto",maxHeight:"calc(100vh - 57px)",flexShrink:0}}>

              {/* Input type tabs */}
              <div style={{borderBottom:"1px solid var(--border)"}}>
                <div className="pane-header"><span style={{color:"var(--muted)"}}>//</span> INPUT_TYPE</div>
                <div className="tab-row">
                  {INPUT_TYPES.map(t=>(
                    <button key={t} className={`tab-btn ${activeTab===t?"active":""}`} onClick={()=>setActiveTab(t)}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              {/* Input fields */}
              <div className="ctrl-section">
                <div style={{marginBottom:8,fontSize:11,color:"var(--muted)"}}>
                  <span className="prompt">user@qrkey:~$</span> input --type={activeTab.toLowerCase()}
                </div>
                {activeTab==="URL" && (
                  <div>
                    <div className="term-label" style={{marginBottom:4}}>&gt; target_url</div>
                    <input className="term-input" placeholder="https://example.com" value={urlValue} onChange={e=>setUrlValue(e.target.value)} />
                  </div>
                )}
                {activeTab==="Text" && (
                  <div>
                    <div className="term-label" style={{marginBottom:4}}>&gt; payload</div>
                    <textarea className="term-input" rows={3} placeholder="enter payload..." value={textValue} onChange={e=>setTextValue(e.target.value)} />
                  </div>
                )}
                {activeTab==="WiFi" && (
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    <div>
                      <div className="term-label" style={{marginBottom:4}}>&gt; ssid</div>
                      <input className="term-input" placeholder="MyNetwork" value={wifiData.ssid} onChange={e=>setWifiData(p=>({...p,ssid:e.target.value}))} />
                    </div>
                    <div>
                      <div className="term-label" style={{marginBottom:4}}>&gt; psk</div>
                      <input className="term-input" type="password" placeholder="••••••••" value={wifiData.password} onChange={e=>setWifiData(p=>({...p,password:e.target.value}))} />
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      {["WPA","WEP","nopass"].map(s=>(
                        <button key={s} className={`term-btn ${wifiData.security===s?"active":""}`} style={{flex:1}}
                          onClick={()=>setWifiData(p=>({...p,security:s}))}>
                          {s}
                        </button>
                      ))}
                    </div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontSize:11,color:"var(--muted)"}}>--hidden-ssid</span>
                      <div className={`term-toggle ${wifiData.hidden?"on":""}`} onClick={()=>setWifiData(p=>({...p,hidden:!p.hidden}))} />
                    </div>
                  </div>
                )}
                {activeTab==="vCard" && (
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {[{k:"name",l:"fn (full_name)"},{k:"phone",l:"tel"},{k:"email",l:"email"},{k:"org",l:"org"},{k:"url",l:"url"}].map(({k,l})=>(
                      <div key={k}>
                        <div className="term-label" style={{marginBottom:3}}>&gt; {l}</div>
                        <input className="term-input" placeholder={l} value={vcardData[k]} onChange={e=>setVcardData(p=>({...p,[k]:e.target.value}))} />
                      </div>
                    ))}
                  </div>
                )}
                {/* Payload size meter */}
                <div style={{marginTop:12,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,color:"var(--muted)"}}>PAYLOAD</span>
                  <TermBar value={Math.min(dataLen,300)} max={300} width={18} />
                  <span style={{fontSize:10,color:"var(--muted)"}}>{dataLen}B</span>
                </div>
              </div>

              {/* Colors */}
              <div className="ctrl-section">
                <div className="pane-header" style={{padding:"0 0 8px 0",border:"none"}}><span style={{color:"var(--muted)"}}>//</span> COLOR_CONFIG</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:"var(--muted)"}}>--fg <span style={{color:"var(--primary)"}}>{fgColor}</span></span>
                    <input type="color" value={fgColor} onChange={e=>setFgColor(e.target.value)} />
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:"var(--muted)"}}>--bg <span style={{color:"var(--primary)"}}>{transparentBg?"transparent":bgColor}</span></span>
                    {!transparentBg && <input type="color" value={bgColor} onChange={e=>setBgColor(e.target.value)} />}
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:"var(--muted)"}}>--transparent-bg</span>
                    <div className={`term-toggle ${transparentBg?"on":""}`} onClick={()=>setTransparentBg(p=>!p)} />
                  </div>
                  {/* Contrast meter */}
                  {!transparentBg && (
                    <div style={{fontSize:10,letterSpacing:"0.05em"}}>
                      <span style={{color:contrastOk?"var(--primary)":"var(--error)",textShadow:contrastOk?"var(--glow)":"0 0 6px rgba(255,51,51,0.6)"}}>
                        {contrastOk?"[OK] ":"[WARN]"} CONTRAST_RATIO: {contrastVal}:1
                      </span>
                      &nbsp;
                      <TermBar value={Math.min(parseFloat(contrastVal),21)} max={21} width={12} />
                    </div>
                  )}
                </div>
              </div>

              {/* Dot style */}
              <div className="ctrl-section">
                <div className="pane-header" style={{padding:"0 0 8px 0",border:"none"}}><span style={{color:"var(--muted)"}}>//</span> DOT_PATTERN</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {DOT_STYLES.map(s=>(
                    <button key={s} className={`term-btn ${dotStyle===s?"active":""}`} style={{fontSize:10,padding:"5px 2px"}} onClick={()=>setDotStyle(s)}>
                      {s.replace("-"," ")}
                    </button>
                  ))}
                </div>
              </div>

              {/* Eye style */}
              <div className="ctrl-section">
                <div className="pane-header" style={{padding:"0 0 8px 0",border:"none"}}><span style={{color:"var(--muted)"}}>//</span> CORNER_EYE</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {EYE_STYLES.map(s=>(
                    <button key={s} className={`term-btn ${eyeStyle===s?"active":""}`} style={{fontSize:10,padding:"5px 2px"}} onClick={()=>setEyeStyle(s)}>
                      {s==="extra-rounded"?"rounded":s}
                    </button>
                  ))}
                </div>
              </div>

              {/* EC Level */}
              <div className="ctrl-section">
                <div className="pane-header" style={{padding:"0 0 8px 0",border:"none"}}><span style={{color:"var(--muted)"}}>//</span> ERROR_CORRECTION</div>
                <div style={{display:"flex",gap:5}}>
                  {EC_LEVELS.map(l=>(
                    <button key={l} className={`term-btn ${ecLevel===l?"active":""}`} style={{flex:1,fontSize:11}} onClick={()=>setEcLevel(l)}>
                      -{l} <span style={{fontSize:9,opacity:0.7}}>{EC_INFO[l]}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Logo */}
              <div className="ctrl-section">
                <div className="pane-header" style={{padding:"0 0 8px 0",border:"none"}}><span style={{color:"var(--muted)"}}>//</span> LOGO_EMBED</div>
                {!logoUrl?(
                  <div className={`drop-zone ${logoHover?"hover":""}`}
                    onClick={()=>logoInputRef.current?.click()}
                    onDragOver={e=>{e.preventDefault();setLogoHover(true);}}
                    onDragLeave={()=>setLogoHover(false)}
                    onDrop={e=>{e.preventDefault();setLogoHover(false);const f=e.dataTransfer.files?.[0];if(f){const r=new FileReader();r.onload=ev=>setLogoUrl(ev.target.result);r.readAsDataURL(f);}}}>
                    <div style={{fontSize:11,color:"var(--muted)",letterSpacing:"0.08em"}}>
                      <div style={{marginBottom:4}}>&gt; attach --image &lt;file&gt;</div>
                      <div style={{fontSize:10,color:"var(--border)"}}>PNG / SVG / JPG accepted</div>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,border:"1px solid var(--muted)",padding:8}}>
                      <img src={logoUrl} alt="logo" style={{width:32,height:32,objectFit:"contain",border:"1px solid var(--muted)"}} />
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:"var(--primary)",textShadow:"var(--glow)"}}>logo.attached</div>
                        <div style={{fontSize:10,color:"var(--muted)"}}>ec --level=H enforced</div>
                      </div>
                      <button className="term-btn" style={{padding:"3px 8px"}} onClick={removeLogo}>rm</button>
                    </div>
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <span style={{fontSize:10,color:"var(--muted)"}}>--size</span>
                        <span style={{fontSize:10,color:"var(--primary)"}}>{Math.round(logoSize*100)}%</span>
                      </div>
                      <input type="range" min="10" max="40" value={logoSize*100} onChange={e=>setLogoSize(parseInt(e.target.value)/100)} />
                    </div>
                  </div>
                )}
                <input ref={logoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogoUpload} />
              </div>

              {/* Margin */}
              <div style={{padding:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:10,color:"var(--muted)"}}>--quiet-zone</span>
                  <span style={{fontSize:10,color:"var(--primary)"}}>{margin}px</span>
                </div>
                <input type="range" min="0" max="10" value={margin} onChange={e=>setMargin(parseInt(e.target.value))} />
              </div>
            </div>

            {/* ── RIGHT: Preview + Export ── */}
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,gap:28,minWidth:320}}>

              {/* Pane title */}
              <div style={{width:"100%",maxWidth:360}}>
                <div className="pane-header" style={{justifyContent:"space-between"}}>
                  <span><span style={{color:"var(--muted)"}}>//</span> QR_PREVIEW</span>
                  <span style={{fontSize:10,color:"var(--muted)"}}>{qrReady?"[READY]":"[INIT...]"}</span>
                </div>

                {/* QR canvas */}
                <div style={{
                  border:"1px solid var(--border)",
                  borderTop:"none",
                  display:"flex",
                  alignItems:"center",
                  justifyContent:"center",
                  padding:14,
                  background: transparentBg
                    ? "repeating-conic-gradient(#111 0% 25%, #0a0a0a 0% 50%) 0 0 / 14px 14px"
                    : bgColor,
                  position:"relative"
                }}>
                  {/* Corner accents */}
                  <span style={{position:"absolute",top:4,left:4,fontSize:10,color:"var(--muted)",lineHeight:1}}>┌</span>
                  <span style={{position:"absolute",top:4,right:4,fontSize:10,color:"var(--muted)",lineHeight:1}}>┐</span>
                  <span style={{position:"absolute",bottom:4,left:4,fontSize:10,color:"var(--muted)",lineHeight:1}}>└</span>
                  <span style={{position:"absolute",bottom:4,right:4,fontSize:10,color:"var(--muted)",lineHeight:1}}>┘</span>

                  {!libLoaded && (
                    <div style={{width:qrSize,height:qrSize,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
                      <span style={{fontSize:11,color:"var(--muted)",letterSpacing:"0.2em"}}>LOADING ENGINE...</span>
                      <span style={{fontSize:10,color:"var(--border)"}}>initializing qr-code-styling</span>
                    </div>
                  )}
                  <div ref={canvasRef} className="qr-wrap" style={{display:libLoaded?"block":"none"}} />
                </div>

                {/* Data readout */}
                <div style={{border:"1px solid var(--border)",borderTop:"none",padding:"6px 10px",background:"rgba(51,255,0,0.02)"}}>
                  <div style={{fontSize:10,color:"var(--muted)",display:"flex",gap:6,alignItems:"center"}}>
                    <span className="prompt">$</span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,color:"var(--primary)",textShadow:"var(--glow)"}}>
                      {inputData.substring(0,55)}{inputData.length>55?"…":""}
                    </span>
                    <span style={{flexShrink:0,color:"var(--border)"}}>{dataLen}B</span>
                  </div>
                </div>
              </div>

              {/* Download */}
              <div style={{width:"100%",maxWidth:360}}>
                <div className="pane-header"><span style={{color:"var(--muted)"}}>//</span> EXPORT</div>
                <div style={{display:"flex",border:"1px solid var(--border)",borderTop:"none"}}>
                  {["png","svg"].map(fmt=>(
                    <button key={fmt} className="dl-btn" disabled={!qrReady||!!downloading}
                      onClick={()=>handleDownload(fmt)}
                      style={{borderRight:fmt==="png"?"1px solid var(--border)":"none"}}>
                      <span>{downloading===fmt?"writing...":"> qrkey."+fmt}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Status panel */}
              <div style={{width:"100%",maxWidth:360,border:"1px solid var(--border)"}}>
                <div className="pane-header"><span style={{color:"var(--muted)"}}>//</span> SYSTEM_STATUS</div>
                <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
                  {[
                    ["RENDER",    "CLIENT_SIDE",     true],
                    ["PRIVACY",   "NO_SERVER_CALLS", true],
                    ["EC_LEVEL",  ecLevel+` (${EC_INFO[ecLevel]} recovery)`, true],
                    ["CONTRAST",  contrastVal+":1",  contrastOk],
                    ["FORMAT",    "PNG + SVG",        true],
                  ].map(([key,val,ok])=>(
                    <div key={key} style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                      <span style={{color:"var(--muted)"}}>{key}</span>
                      <span style={{color:ok?"var(--primary)":"var(--error)",textShadow:ok?"var(--glow)":"0 0 6px rgba(255,51,51,0.5)"}}>
                        {ok?"[OK] ":"[WARN]"}{val}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Command line easter egg */}
              <div style={{width:"100%",maxWidth:360,fontSize:11,color:"var(--muted)"}}>
                <span className="prompt">user@qrkey:~$</span>{" "}
                <span style={{color:"var(--primary)",textShadow:"var(--glow)"}}>{cmdLine || "qrkey --generate"}</span>
                <span className="blink" style={{color:"var(--primary)"}}>█</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<QRKey />);
  </script>
</body>
</html>
